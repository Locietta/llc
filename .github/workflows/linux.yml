name: Linux Build

on:
  push:
  pull_request:

jobs:
  build-linux:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          submodules: recursive

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install Linux dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            wget \
            jq \
            ninja-build \
            libvulkan-dev \
            vulkan-tools

      - name: Install Slang
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          SLANG_URL="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/shader-slang/slang/releases/latest \
            | jq -r '.assets[].browser_download_url | select(test("slang-.*-linux-x86_64\\.tar\\.gz$"))' | head -n1)"
          test -n "$SLANG_URL"

          mkdir -p "$HOME/.local/slang"
          wget -O /tmp/slang.tar.gz "$SLANG_URL"
          tar -xzf /tmp/slang.tar.gz -C "$HOME/.local/slang"

          echo "$HOME/.local/slang/bin" >> "$GITHUB_PATH"
          echo "SLANG_PATH=$HOME/.local/slang" >> "$GITHUB_ENV"

      - name: Configure
        shell: bash
        run: xmake f -m release -y

      - name: Build
        shell: bash
        run: xmake -vD -y

      - name: Test
        shell: bash
        continue-on-error: true # GPU required; CPU backend lacks wave intrinsics
        run: xmake test -vD
