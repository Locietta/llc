name: CI Build

on:
  push:
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          submodules: recursive

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install dependencies from Scoop
        uses: MinoruSekine/setup-scoop@v4.0.2
        with:
          apps: slang vulkan cmake ninja

      - name: Configure
        shell: pwsh
        run: xmake f -m release -y

      - name: Build
        shell: pwsh
        run: xmake -vD -y

      - name: Test
        shell: pwsh
        continue-on-error: true # GPU required; CPU backend lacks wave intrinsics
        run: xmake test -vD
